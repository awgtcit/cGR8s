<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        @page {
            size: A4;
            margin: 2cm 1.5cm;
            @bottom-center { content: "Page " counter(page) " of " counter(pages); font-size: 9pt; color: #666; }
            @bottom-right { content: "{{ footer_text }}"; font-size: 8pt; color: #999; }
        }
        body { font-family: "Segoe UI", Arial, sans-serif; font-size: 10pt; color: #183026; }
        .header { border-bottom: 3px solid #0D6B3C; padding-bottom: 10px; margin-bottom: 20px; }
        .header h1 { color: #0D6B3C; font-size: 18pt; margin: 0; }
        .header .subtitle { color: #666; font-size: 10pt; }
        .header .company { color: #43B649; font-weight: bold; font-size: 12pt; }
        .meta-table { width: 100%; margin-bottom: 15px; }
        .meta-table td { padding: 3px 8px; font-size: 9pt; }
        .meta-table .label { font-weight: bold; color: #084C2E; width: 120px; }
        table.data { width: 100%; border-collapse: collapse; margin-bottom: 15px; font-size: 9pt; }
        table.data th { background: #0D6B3C; color: white; padding: 6px 8px; text-align: left; }
        table.data td { padding: 5px 8px; border-bottom: 1px solid #DDF3E4; }
        table.data tr:nth-child(even) { background: #F5F7F6; }
        .kpi-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .kpi-box { flex: 1; border: 1px solid #DDF3E4; border-radius: 4px; padding: 10px; text-align: center; }
        .kpi-box .value { font-size: 16pt; font-weight: bold; color: #0D6B3C; }
        .kpi-box .label { font-size: 8pt; color: #666; }
        h2 { color: #084C2E; font-size: 13pt; border-bottom: 1px solid #DDF3E4; padding-bottom: 5px; margin-top: 20px; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 8pt; font-weight: bold; }
        .badge-success { background: #DDF3E4; color: #0D6B3C; }
        .badge-danger { background: #f8d7da; color: #842029; }
        .badge-warning { background: #fff3cd; color: #664d03; }
        .footer-note { margin-top: 30px; padding-top: 10px; border-top: 1px solid #DDF3E4; font-size: 8pt; color: #999; }
    </style>
</head>
<body>
    {% block header %}
    <div class="header">
        <div class="company">{{ company_name }}</div>
        <h1>{{ report_title }}</h1>
        <div class="subtitle">Generated: {{ generated_at }} | By: {{ generated_by }}</div>
    </div>
    {% endblock %}

    {% block content %}{% endblock %}

    {% block footer %}
    <div class="footer-note">
        This report was auto-generated by cGR8s. {{ footer_text }}
    </div>
    {% endblock %}
</body>
</html>
