{# HTMX partial – Role permission assignment modal #}
<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-key me-2"></i>Role Permissions</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form method="POST" action="{{ url_for('admin.update_role_permissions', role_id=role_id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="modal-body" style="max-height:60vh;overflow-y:auto;">
        <p class="text-muted small mb-3">Check the permissions this role should have.</p>
        {% for category, perms in categories.items() %}
        <h6 class="border-bottom pb-1 mb-2 mt-3">{{ category }}</h6>
        {% for p in perms %}
        <div class="form-check mb-1">
            <input class="form-check-input" type="checkbox" name="permission_ids" value="{{ p.id }}"
                id="perm_{{ p.id }}" {% if p.assigned %}checked{% endif %}>
            <label class="form-check-label" for="perm_{{ p.id }}">
                {{ p.name }} <code class="ms-1 small text-muted">{{ p.code }}</code>
            </label>
        </div>
        {% endfor %}
        {% endfor %}
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Permissions</button>
    </div>
</form>
