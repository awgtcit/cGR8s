{# HTMX partial – Create Role modal form #}
<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-plus-circle me-2"></i>Create New Role</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form method="POST" action="{{ url_for('admin.create_role') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="modal-body">
        <div class="mb-3">
            <label for="role_name" class="form-label fw-semibold">Role Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="role_name" name="role_name" placeholder="e.g. cGR8s Supervisor"
                required maxlength="200">
            <div class="form-text">Display name for the role.</div>
        </div>
        <div class="mb-3">
            <label for="role_code" class="form-label fw-semibold">Role Code <span class="text-danger">*</span></label>
            <div class="input-group">
                <span class="input-group-text">CGRS_</span>
                <input type="text" class="form-control text-uppercase" id="role_code_suffix" name="role_code_suffix"
                    placeholder="e.g. SUPERVISOR" required maxlength="30" pattern="[A-Za-z0-9_]{2,30}"
                    title="2-30 letters, digits or underscores">
            </div>
            <input type="hidden" id="role_code" name="role_code">
            <div class="form-text">Unique code. Will be prefixed with <code>CGRS_</code> automatically.</div>
        </div>
        <div class="mb-3">
            <label for="role_description" class="form-label fw-semibold">Description</label>
            <textarea class="form-control" id="role_description" name="role_description" rows="2" maxlength="500"
                placeholder="Optional description of this role's purpose"></textarea>
        </div>
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary" id="btnCreateRole">
            <i class="bi bi-plus-lg me-1"></i>Create Role
        </button>
    </div>
</form>
<script>
    (function () {
        const suffixInput = document.getElementById('role_code_suffix');
        const hiddenInput = document.getElementById('role_code');
        function syncCode() {
            hiddenInput.value = 'CGRS_' + suffixInput.value.toUpperCase().replace(/[^A-Z0-9_]/g, '');
        }
        suffixInput.addEventListener('input', syncCode);
        // Sync on form submit
        suffixInput.closest('form').addEventListener('submit', syncCode);
    })();
</script>
