{# HTMX partial – User role assignment modal #}
<div class="modal-header">
    <h5 class="modal-title"><i class="bi bi-person-badge me-2"></i>Manage User Roles</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form method="POST" action="{{ url_for('admin.update_user_roles', user_id=user_id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="modal-body">
        <p class="text-muted small mb-3">Select the roles to assign. Unselected roles will be removed.</p>
        {% for role in all_roles %}
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" name="role_codes" value="{{ role.code }}"
                id="role_{{ role.id }}" {% if role.code in assigned_codes %}checked{% endif %}>
            <label class="form-check-label" for="role_{{ role.id }}">
                <span class="fw-semibold">{{ role.name }}</span>
                <code class="ms-2 small text-muted">{{ role.code }}</code>
            </label>
        </div>
        {% endfor %}
    </div>
    <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg me-1"></i>Save Roles</button>
    </div>
</form>
