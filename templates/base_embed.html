<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}cGR8s{% endblock %}</title>

    <!-- Inter Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Styles -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    {% block extra_css %}{% endblock %}
    <style>
        /* Remove any chrome margins/paddings for embed mode */
        body {
            margin: 0;
            padding: 0;
            background: transparent;
        }

        .embed-container {
            padding: 16px;
        }
    </style>
</head>

<body>
    <div class="embed-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <!-- jQuery -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.3/dist/cdn.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        /* Propagate embed=1 and embed_token on all HTMX requests so sub-pages stay authenticated in embed mode */
        (function () {
            var params = new URLSearchParams(window.location.search);
            var embedToken = params.get('embed_token') || '';
            var csrfMeta = document.querySelector('meta[name="csrf-token"]');
            var csrfToken = csrfMeta ? csrfMeta.getAttribute('content') : '';

            /* ── HTMX: propagate embed + CSRF on every HTMX request ── */
            document.body.addEventListener('htmx:configRequest', function (evt) {
                var p = evt.detail.parameters;
                if (!p.embed) p.embed = '1';
                if (embedToken && !p.embed_token) p.embed_token = embedToken;
                if (csrfToken) evt.detail.headers['X-CSRFToken'] = csrfToken;
            });

            /* ── Native forms: inject embed_token as hidden field ── */
            if (embedToken) {
                document.addEventListener('submit', function (evt) {
                    var form = evt.target;
                    if (form.tagName !== 'FORM') return;
                    if (!form.querySelector('input[name="embed_token"]')) {
                        var h = document.createElement('input');
                        h.type = 'hidden'; h.name = 'embed_token'; h.value = embedToken;
                        form.appendChild(h);
                    }
                    if (!form.querySelector('input[name="embed"]')) {
                        var e = document.createElement('input');
                        e.type = 'hidden'; e.name = 'embed'; e.value = '1';
                        form.appendChild(e);
                    }
                }, true);
            }

            /* ── fetch/XHR: add embed header for JS fetch() calls ── */
            if (embedToken && window.fetch) {
                var _origFetch = window.fetch;
                window.fetch = function (url, opts) {
                    opts = opts || {};
                    opts.headers = opts.headers || {};
                    if (!opts.headers['X-Embed-Token']) opts.headers['X-Embed-Token'] = embedToken;
                    if (!opts.headers['X-CSRFToken'] && csrfToken) opts.headers['X-CSRFToken'] = csrfToken;
                    return _origFetch.call(this, url, opts);
                };
            }
        })();
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
