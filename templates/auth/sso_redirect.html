<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – cGR8s</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0D6B3C;
            --secondary: #43B649;
            --forest: #084C2E;
            --mint: #DDF3E4;
        }
        body {
            background: linear-gradient(135deg, var(--forest) 0%, var(--primary) 50%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .sso-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
            padding: 3rem 2.5rem;
            max-width: 440px;
            text-align: center;
        }
        .sso-card h1 { font-size: 1.75rem; color: var(--forest); margin-bottom: .5rem; }
        .sso-card p  { color: #555; margin-bottom: 1.5rem; }
        .btn-auth {
            background: var(--primary); color: #fff; border: none;
            padding: .75rem 2rem; border-radius: 8px; font-size: 1rem;
            text-decoration: none; display: inline-block; transition: background .2s;
        }
        .btn-auth:hover { background: var(--forest); color: #fff; }
        .flash-msg { margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="sso-card">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} flash-msg" role="alert">{{ msg }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <h1><i class="bi bi-shield-lock"></i> cGR8s</h1>
        <p>This application uses single sign-on.<br>Please log in through the Authentication Portal.</p>
        <a href="{{ auth_url }}" class="btn-auth">
            <i class="bi bi-box-arrow-in-right"></i> Go to Auth Portal
        </a>
    </div>
</body>
</html>
